<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>L'Oréal AI Routine Builder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>💄 L'Oréal AI Routine Builder</h1>
  <p>Select products and generate your personalized routine</p>
</header>

<main class="layout">

  <!-- PRODUCTS -->
  <section class="products-section">

    <div class="top-bar">
      <select id="categoryFilter">
        <option value="all">All</option>
        <option value="skincare">Skincare</option>
        <option value="makeup">Makeup</option>
        <option value="haircare">Haircare</option>
      </select>

      <input id="searchInput" placeholder="Search products..." />
    </div>

    <div id="productGrid" class="grid"></div>
  </section>

  <!-- SIDE PANEL -->
  <aside class="side-panel">

    <div class="selected-box">
      <h2>Selected Products</h2>
      <div id="selectedProducts"></div>

      <button onclick="generateRoutine()" class="btn">Generate Routine</button>
      <button onclick="clearAll()" class="btn secondary">Clear All</button>
    </div>

    <div class="chat-box">
      <h2>AI Chat</h2>

      <div id="chatBox"></div>

      <form id="chatForm">
        <input id="chatInput" placeholder="Ask about skincare..." />
        <button>Send</button>
      </form>
    </div>

  </aside>

</main>

<script src="script.js"></script>
</body>
</html>
