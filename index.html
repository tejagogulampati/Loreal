<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>L’Oréal Hair & Beauty Advisor</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>
  <div class="page-wrapper">

    <!-- HEADER -->
    <header class="site-header">
      <img src="loreal-logo.png" class="logo" />
      <h1 class="site-title">L’Oréal Hair & Beauty Advisor</h1>
      <p class="subtitle">Personalized care for hair, skin, and style</p>
    </header>

    <!-- CHAT -->
    <main>
      <section class="chatbox">
        <div id="chatWindow" class="chat-window"></div>

        <form id="chatForm" class="chat-form">
          <input
            id="userInput"
            type="text"
            placeholder="Ask about haircare, routines, products..."
            autocomplete="off"
            required
          />
          <button type="submit">
            <span class="material-icons">send</span>
          </button>
        </form>
      </section>
    </main>

    <!-- FOOTER -->
    <footer class="site-footer">
      <p>&copy; 2026 L’Oréal. All rights reserved.</p>
    </footer>

  </div>

  <script src="script.js"></script>
</body>
</html>
